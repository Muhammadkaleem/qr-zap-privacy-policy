<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalmPath</title>
    <meta name="description" content="CalmPath — a calmer place to check in. Privacy, terms, and account deletion." />
    <style>
      :root{--teal:#1d9e87;--teal-700:#157a68;--bg:#f7f5f2;--card:#fff;--text:#1a1a1a;--muted:#5c5c5c;--border:#e6e2dd}
      @media (prefers-color-scheme:dark){:root{--bg:#14181a;--card:#1e2427;--text:#f2f2f0;--muted:#a8b0b2;--border:#2c3438}}
      *{box-sizing:border-box}
      body{margin:0;background:var(--bg);color:var(--text);line-height:1.6;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .wrap{max-width:640px;margin:0 auto;padding:56px 20px}
      header{display:flex;align-items:center;gap:14px;margin-bottom:8px}
      .dot{width:44px;height:44px;border-radius:50%;background:var(--teal);flex:none}
      h1{font-size:2rem;margin:6px 0 2px}
      .tag{color:var(--teal-700);font-weight:600;margin:0 0 28px}
      a.card{display:block;background:var(--card);border:1px solid var(--border);border-radius:14px;
        padding:16px 18px;margin:12px 0;text-decoration:none;color:var(--text)}
      a.card:hover{border-color:var(--teal)}
      .card .t{font-weight:600}
      .card .d{color:var(--muted);font-size:.94rem}
      footer{margin-top:32px;color:var(--muted);font-size:.9rem}
      a{color:var(--teal-700)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <header><span class="dot"></span><h1>CalmPath</h1></header>
      <p class="tag">A calmer place to check in.</p>

      <a class="card" href="privacy/"><span class="t">Privacy Policy</span><br /><span class="d">What we collect, how it's encrypted, and your choices.</span></a>
      <a class="card" href="terms/"><span class="t">Terms of Service</span><br /><span class="d">The terms that govern your use of CalmPath.</span></a>
      <a class="card" href="account-deletion/"><span class="t">Delete your account</span><br /><span class="d">How to permanently delete your account and data.</span></a>

      <footer>Support: <a href="mailto:support@calmpath.app">support@calmpath.app</a></footer>
    </div>
  </body>
</html>
